<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALLSPARK // HUDSON YARDS ENV_TEST</title>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fragment+Mono:ital@0;1&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --t1: rgba(255,255,255,0.95);
            --t2: rgba(255,255,255,0.60);
            --t3: rgba(255,255,255,0.30);
            --accent: #fff;
            --ln: rgba(255,255,255,0.15);
        }

        body, html { overflow: hidden; width: 100%; height: 100%; margin: 0; padding: 0; background-color: #000; font-family: 'Fragment Mono', monospace; color: var(--t1); }
        #renderCanvas { width: 100%; height: 100%; touch-action: none; outline: none; z-index: 1; }
        
        #fui-hud { position: absolute; inset: 0; pointer-events: none; z-index: 10; padding: 30px; display: flex; flex-direction: column; justify-content: space-between; }
        .pointer { pointer-events: auto; }

        .brk { position: absolute; width: 30px; height: 30px; border: 1px solid var(--t3); pointer-events: none; }
        .tl { top: 20px; left: 20px; border-right: none; border-bottom: none; }
        .tr { top: 20px; right: 20px; border-left: none; border-bottom: none; }
        .bl { bottom: 20px; left: 20px; border-right: none; border-top: none; }
        .br { bottom: 20px; right: 20px; border-left: none; border-top: none; }

        .header { display: flex; justify-content: space-between; font-size: 10px; letter-spacing: 4px; border-bottom: 1px solid var(--ln); padding-bottom: 10px; }
        .side-panel { width: 220px; display: flex; flex-direction: column; gap: 20px; margin-top: 40px; }
        .panel-box { background: rgba(0,0,0,0.6); border: 1px solid var(--ln); padding: 15px; backdrop-filter: blur(10px); }
        .label { font-size: 8px; color: var(--t3); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 9px; color: var(--t1); }
        .stat-val { color: var(--accent); }
        .status-dot { display: inline-block; width: 6px; height: 6px; background: #f00; border-radius: 50%; margin-right: 5px; }
        
        input[type=range] { width: 100%; accent-color: var(--accent); cursor: crosshair; background: rgba(255,255,255,0.1); height: 2px; appearance: none; }

        .geo-list { display: flex; flex-direction: column; gap: 5px; }
        .geo-btn { 
            background: transparent; border: 1px solid var(--ln); color: var(--t2); 
            font-family: 'Fragment Mono'; font-size: 9px; padding: 8px; text-align: left;
            cursor: pointer; transition: 0.2s; text-transform: uppercase;
        }
        .geo-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .geo-btn.active { border-color: var(--accent); color: #fff; background: rgba(255,255,255,0.05); }

        .footer { display: flex; justify-content: space-between; font-size: 9px; color: var(--t3); border-top: 1px solid var(--ln); padding-top: 10px; }
    </style>
</head>
<body>
    <div id="fui-hud">
        <div class="brk tl"></div><div class="brk tr"></div><div class="brk bl"></div><div class="brk br"></div>
        
        <div class="header">
            <div>ALLSPARK // HUDSON YARDS CLIMATE INFRASTRUCTURE</div>
            <div id="clock">00:00:00</div>
        </div>

        <div style="display: flex; justify-content: space-between; height: 100%;">
            <div class="side-panel">
                <div class="panel-box pointer">
                    <div class="label">01 // SUN_SIMULATOR</div>
                    <div style="margin-bottom:15px">
                        <div class="label" style="color:var(--t2)">HOUR: <span id="hour-val">14</span>:00</div>
                        <input type="range" id="sun-hour" min="6" max="19" step="0.01" value="14">
                    </div>
                    <div>
                        <div class="label" style="color:var(--t2)">MONTH_CYCLE</div>
                        <input type="range" id="sun-month" min="0" max="11" step="1" value="5">
                    </div>
                </div>

                <div class="panel-box pointer">
                    <div class="label">02 // TRANSIT LIVE</div>
                    <div class="stat-row"><span>FLIGHTS</span><span id="count-plane" class="stat-val">0</span></div>
                    <div class="stat-row"><span>HELICOPTERS</span><span id="count-heli" class="stat-val">0</span></div>
                    <div class="stat-row"><span>FERRIES</span><span id="count-ferry" class="stat-val">0</span></div>
                    <div class="stat-row"><span>SUBWAY/BUS</span><span id="count-transit" class="stat-val">0</span></div>
                    <div style="margin-top: 10px; font-size: 8px; color: var(--t3);">
                        <span id="flight-status" class="status-dot"></span> API STATUS
                    </div>
                </div>
            </div>

            <div class="side-panel">
                <div class="panel-box pointer">
                    <div class="label">03 // GEOMETRY_TOGGLE</div>
                    <div class="geo-list" id="geo-list"></div>
                </div>
            </div>
        </div>

        <div class="footer">
            <div>MODE: SOLID_HIGHLIGHT_ISOLATION</div>
            <div>STATUS: NOMINAL // REF_v02</div>
        </div>
    </div>
    
    <canvas id="renderCanvas"></canvas>

    <script>
        const canvas = document.getElementById("renderCanvas");
        const engine = new BABYLON.Engine(canvas, true);

        const PARAMS = {
            matOpacity: 1,      
            wireOpacity: 0.04,  
            edgeOpacity: 0.0,
            fogDensity: 0.0004, 
            vignetteWeight: 3.5,
            contrast: 1.6,
            // Path configuration for models in parent directory
            assetPath: "../" 
        };

        const CONFIG = {
            ORIGIN_LAT: 40.755080,
            ORIGIN_LON: -74.006216,
            METERS_PER_THREE_UNIT: 1, // 1 unit = 1 meter in Babylon scene
            RADIUS_NM: 4,
            API_INTERVAL: 5000,
            DELAY_MS: 6000
        };

        const GEO_MATH = {
            DEG_LAT_TO_METERS: 111320,
            get DEG_LON_TO_METERS() { return 111320 * Math.cos(CONFIG.ORIGIN_LAT * (Math.PI / 180)); },
            
            toCartesian: function(lat, lon, altitudeMeters = 0) {
                const xMeters = (lon - CONFIG.ORIGIN_LON) * this.DEG_LON_TO_METERS;
                // Note: Babylon is left-handed, Y is up, X is right, Z is forward
                // In features_to_int logic, -Z was North. In Babylon, +Z is typically forward/North
                // Wait, lat difference: positive means North. North should map to +Z in Babylon.
                const zMeters = (lat - CONFIG.ORIGIN_LAT) * this.DEG_LAT_TO_METERS; 
                
                return new BABYLON.Vector3(
                    xMeters / CONFIG.METERS_PER_THREE_UNIT,
                    altitudeMeters / CONFIG.METERS_PER_THREE_UNIT,
                    zMeters / CONFIG.METERS_PER_THREE_UNIT
                );
            }
        };

        // --- 3. STATE MANAGEMENT ---
        const objectMap = new Map(); 

        function feetToMeters(feet) { return feet * 0.3048; }
        function easeInOutQuad(t) { return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; }
        function lerpAngle(start, end, amt) {
            let diff = end - start;
            while (diff < -180) diff += 360;
            while (diff > 180) diff -= 360;
            return start + diff * amt;
        }

        const DWELL_TIME_MS = 15000; 
        const TERMINUS_DWELL_TIME_MS = 40000; 

        const SIM_ROUTES = [
            { id: 'f_weehawken', type: 'ferry', name: 'NYWW (Weehawken)', speedKmh: 35, altMeters: 0, fleetSize: 2, path: [{ lat: 40.7618, lon: -74.0055 }, { lat: 40.7625, lon: -74.0080 }, { lat: 40.7680, lon: -74.0095 }, { lat: 40.7760, lon: -74.0120 }] },
            { id: 'f_hoboken14', type: 'ferry', name: 'NYWW (Hoboken 14th)', speedKmh: 35, altMeters: 0, fleetSize: 2, path: [{ lat: 40.7618, lon: -74.0055 }, { lat: 40.7600, lon: -74.0090 }, { lat: 40.7550, lon: -74.0150 }, { lat: 40.7520, lon: -74.0220 }] },
            { id: 'f_hobokennjt', type: 'ferry', name: 'NYWW (Hoboken NJT)', speedKmh: 35, altMeters: 0, fleetSize: 3, path: [{ lat: 40.7618, lon: -74.0055 }, { lat: 40.7550, lon: -74.0090 }, { lat: 40.7450, lon: -74.0140 }, { lat: 40.7380, lon: -74.0220 }, { lat: 40.7350, lon: -74.0270 }] },
            { id: 'f_paulus', type: 'ferry', name: 'NYWW (Paulus Hook)', speedKmh: 35, altMeters: 0, fleetSize: 3, path: [{ lat: 40.7618, lon: -74.0055 }, { lat: 40.7500, lon: -74.0110 }, { lat: 40.7350, lon: -74.0160 }, { lat: 40.7200, lon: -74.0230 }, { lat: 40.7110, lon: -74.0330 }] },
            { id: 'f_stgeorge', type: 'ferry', name: 'NYC Ferry (St George)', speedKmh: 40, altMeters: 0, fleetSize: 3, path: [{ lat: 40.7618, lon: -74.0055 }, { lat: 40.7500, lon: -74.0110 }, { lat: 40.7350, lon: -74.0160 }, { lat: 40.7200, lon: -74.0200 }, { lat: 40.7050, lon: -74.0210 }, { lat: 40.6950, lon: -74.0220 }, { lat: 40.6700, lon: -74.0400 }, { lat: 40.6430, lon: -74.0730 }] },
            { id: 'f_astoria', type: 'ferry', name: 'NYC Ferry (Astoria)', speedKmh: 35, altMeters: 0, fleetSize: 3, path: [{ lat: 40.7035, lon: -74.0050 }, { lat: 40.7020, lon: -74.0020 }, { lat: 40.7065, lon: -73.9970 }, { lat: 40.7095, lon: -73.9890 }, { lat: 40.7120, lon: -73.9780 }, { lat: 40.7135, lon: -73.9710 }, { lat: 40.7400, lon: -73.9610 }, { lat: 40.7435, lon: -73.9680 }, { lat: 40.7550, lon: -73.9530 }, { lat: 40.7700, lon: -73.9350 }] },
            { id: 's_1', type: 'subway', name: '1/2/3 Train', speedKmh: 45, altMeters: -20, fleetSize: 4, path: [{ lat: 40.7656, lon: -73.9804 }, { lat: 40.7380, lon: -73.9996 }] },
            { id: 's_A', type: 'subway', name: 'A/C/E Train', speedKmh: 50, altMeters: -25, fleetSize: 5, path: [{ lat: 40.7668, lon: -73.9828 }, { lat: 40.7400, lon: -74.0018 }] },
            { id: 's_N', type: 'subway', name: 'N/Q/R/W Train', speedKmh: 45, altMeters: -15, fleetSize: 4, path: [{ lat: 40.7656, lon: -73.9804 }, { lat: 40.7559, lon: -73.9866 }, { lat: 40.7497, lon: -73.9878 }, { lat: 40.7354, lon: -73.9904 }] },
            { id: 's_7', type: 'subway', name: '7 Train', speedKmh: 45, altMeters: -35, fleetSize: 3, path: [{ lat: 40.7516, lon: -73.9765 }, { lat: 40.7573, lon: -73.9897 }, { lat: 40.7568, lon: -73.9965 }, { lat: 40.7546, lon: -74.0021 }] },
            { id: 's_L', type: 'subway', name: 'L Train', speedKmh: 45, altMeters: -20, fleetSize: 3, path: [{ lat: 40.7400, lon: -74.0018 }, { lat: 40.7317, lon: -73.9818 }] },
            { id: 'b_M34', type: 'bus', name: 'M34 SBS', speedKmh: 20, altMeters: 0.5, fleetSize: 4, path: [{ lat: 40.7566, lon: -74.0068 }, { lat: 40.7436, lon: -73.9734 }] },
            { id: 'b_M42', type: 'bus', name: 'M42 Local', speedKmh: 15, altMeters: 0.5, fleetSize: 4, path: [{ lat: 40.7618, lon: -74.0001 }, { lat: 40.7486, lon: -73.9675 }] },
            { id: 'b_M11', type: 'bus', name: 'M11 Local', speedKmh: 22, altMeters: 0.5, fleetSize: 4, path: [{ lat: 40.7681, lon: -73.9855 }, { lat: 40.7415, lon: -74.0047 }] }
        ];

        SIM_ROUTES.forEach(route => {
            route.schedule = [];
            let currentTime = 0;
            const buildDirection = (path) => {
                for (let i = 0; i < path.length - 1; i++) {
                    const p1 = GEO_MATH.toCartesian(path[i].lat, path[i].lon, route.altMeters);
                    const p2 = GEO_MATH.toCartesian(path[i+1].lat, path[i+1].lon, route.altMeters);
                    const distKm = BABYLON.Vector3.Distance(p1, p2) * (CONFIG.METERS_PER_THREE_UNIT / 1000);
                    const dx = p2.x - p1.x; const dz = p2.z - p1.z;
                    // In Babylon, heading is around Y axis, +Z is forward, +X is right
                    let heading = (Math.atan2(dx, dz) * 180 / Math.PI);
                    if (heading < 0) heading += 360;
                    const travelTimeMs = (distKm / route.speedKmh) * 3600000;
                    route.schedule.push({ type: 'move', p1: p1, p2: p2, heading: heading, startTime: currentTime, endTime: currentTime + travelTimeMs });
                    currentTime += travelTimeMs;
                    const isTerminus = i === path.length - 2;
                    const dwellTime = isTerminus ? TERMINUS_DWELL_TIME_MS : DWELL_TIME_MS;
                    route.schedule.push({ type: 'stop', pos: p2, heading: heading, startTime: currentTime, endTime: currentTime + dwellTime });
                    currentTime += dwellTime;
                }
            };
            buildDirection(route.path);
            buildDirection([...route.path].reverse());
            route.totalLoopDurationMs = currentTime;
        });


        const createScene = function () {
            const scene = new BABYLON.Scene(engine);
            scene.clearColor = new BABYLON.Color4(0, 0, 0, 1);

            scene.fogMode = BABYLON.Scene.FOGMODE_EXP;
            scene.fogColor = new BABYLON.Color3(0, 0, 0);
            scene.fogDensity = PARAMS.fogDensity;

            const camera = new BABYLON.ArcRotateCamera("camera", -1.8, 1.2, 800, BABYLON.Vector3.Zero(), scene);
            camera.attachControl(canvas, true);

            // --- LIGHTING ---
            const sunLight = new BABYLON.DirectionalLight("sunLight", new BABYLON.Vector3(-1, -2, -1), scene);
            sunLight.position = new BABYLON.Vector3(200, 500, 200);
            sunLight.intensity = 6.0;

            const shadowGen = new BABYLON.ShadowGenerator(2048, sunLight);
            shadowGen.usePoissonSampling = true; 

            const ambient = new BABYLON.HemisphericLight("ambient", new BABYLON.Vector3(0, 1, 0), scene);
            ambient.intensity = 0.5;

            // --- MATERIALS ---
            const whiteMat = new BABYLON.PBRMaterial("whiteMat", scene);
            whiteMat.albedoColor = new BABYLON.Color3(0.5, 0.5, 0.5);
            whiteMat.roughness = 1.0;
            whiteMat.metallic = 0.0;
            whiteMat.alpha = PARAMS.matOpacity;
            whiteMat.backFaceCulling = false;

            const activeMat = new BABYLON.StandardMaterial("activeMat", scene);
            activeMat.emissiveColor = new BABYLON.Color3(1, 1, 1);
            activeMat.disableLighting = true; 

            const wireMat = new BABYLON.StandardMaterial("wireMat", scene);
            wireMat.emissiveColor = new BABYLON.Color3(1, 1, 1);
            wireMat.wireframe = true;
            wireMat.alpha = PARAMS.wireOpacity;
            wireMat.disableLighting = true; 
            wireMat.zOffset = -2;

            // --- TRANSIT ASSETS & VISUALIZATION ---
            const transitMaterials = {
                plane: new BABYLON.StandardMaterial("planeMat", scene),
                heli: new BABYLON.StandardMaterial("heliMat", scene),
                ferry: new BABYLON.StandardMaterial("ferryMat", scene),
                subway: new BABYLON.StandardMaterial("subwayMat", scene),
                bus: new BABYLON.StandardMaterial("busMat", scene)
            };

            transitMaterials.plane.emissiveColor = new BABYLON.Color3(0, 1, 1);
            transitMaterials.plane.disableLighting = true;
            transitMaterials.heli.emissiveColor = new BABYLON.Color3(1, 0.6, 0);
            transitMaterials.heli.disableLighting = true;
            transitMaterials.ferry.emissiveColor = new BABYLON.Color3(1, 0, 1);
            transitMaterials.ferry.disableLighting = true;
            transitMaterials.subway.emissiveColor = new BABYLON.Color3(0.6, 0.2, 1);
            transitMaterials.subway.disableLighting = true;
            transitMaterials.bus.emissiveColor = new BABYLON.Color3(0.2, 1, 0.2);
            transitMaterials.bus.disableLighting = true;

            const transitTemplates = {
                plane: BABYLON.MeshBuilder.CreateCylinder("t_plane", {diameterTop: 2, diameterBottom: 2, height: 10}, scene),
                heli: BABYLON.MeshBuilder.CreateSphere("t_heli", {diameter: 4}, scene),
                ferry: BABYLON.MeshBuilder.CreateBox("t_ferry", {width: 4, height: 2, depth: 8}, scene),
                subway: BABYLON.MeshBuilder.CreateBox("t_subway", {width: 3, height: 3, depth: 15}, scene),
                bus: BABYLON.MeshBuilder.CreateBox("t_bus", {width: 2.5, height: 2.5, depth: 6}, scene)
            };

            transitTemplates.plane.rotation.x = Math.PI / 2;
            
            Object.keys(transitTemplates).forEach(k => {
                transitTemplates[k].material = transitMaterials[k];
                transitTemplates[k].isVisible = false;
            });

            function initEntity(id, type, labelText) {
                if (!objectMap.has(id)) {
                    objectMap.set(id, {
                        type: type,
                        history: [],
                        currentPos: new BABYLON.Vector3(),
                        currentHeading: 0,
                        targetHeading: 0,
                        isStale: false,
                        lastSeen: Date.now(),
                        labelText: labelText,
                        mesh: null, trail: null
                    });
                    
                    const entity = objectMap.get(id);
                    entity.mesh = transitTemplates[type].clone(id);
                    entity.mesh.isVisible = true;

                    // We delay trail creation until the first position update 
                    // to prevent trails drawing from the origin (0,0,0).
                }
            }

            function removePresentationAssets(id) {
                const entity = objectMap.get(id);
                if (!entity) return;
                if (entity.mesh) entity.mesh.dispose();
                if (entity.trail) entity.trail.dispose();
            }

            // Initialize static transit fleet
            SIM_ROUTES.forEach(route => {
                for (let j = 0; j < route.fleetSize; j++) {
                    initEntity(`${route.id}_v${j}`, route.type, route.name);
                }
            });

            async function fetchFlights() {
                const flightStatus = document.getElementById('flight-status');
                flightStatus.style.background = '#ffaa00';
                const endpoints = [
                    `https://api.airplanes.live/v2/point/${CONFIG.ORIGIN_LAT}/${CONFIG.ORIGIN_LON}/${CONFIG.RADIUS_NM}`,
                    `https://api.adsb.lol/v2/point/${CONFIG.ORIGIN_LAT}/${CONFIG.ORIGIN_LON}/${CONFIG.RADIUS_NM}`
                ];
                let data = null;
                for (const url of endpoints) {
                    try {
                        const response = await fetch(url);
                        if (response.ok) { data = await response.json(); break; }
                    } catch (e) {}
                }
                if (!data || !data.ac) { flightStatus.style.background = '#ff3333'; return; }
                const currentFlightIds = new Set();
                data.ac.forEach(ac => {
                    if (!ac.lat || !ac.lon) return;
                    currentFlightIds.add(ac.hex);
                    const isHeli = (ac.category === 'A7' || ac.category === 'A07' || (ac.desc && ac.desc.toUpperCase() === 'ROTORCRAFT'));
                    const altMeters = ac.alt_baro === 'ground' ? 0 : feetToMeters(ac.alt_baro || ac.alt_geom || 0);
                    initEntity(ac.hex, isHeli ? 'heli' : 'plane', `${ac.flight || ac.hex}\n${Math.round(altMeters * 3.28)}ft`);
                    const entity = objectMap.get(ac.hex);
                    entity.isStale = false; entity.lastSeen = Date.now();
                    entity.history.push({ pos: GEO_MATH.toCartesian(ac.lat, ac.lon, altMeters), time: Date.now(), heading: ac.track || 0, gs: ac.gs || 0 });
                    const cutoff = Date.now() - (CONFIG.DELAY_MS + 60000); 
                    entity.history = entity.history.filter(h => h.time > cutoff);
                });
                for (const [id, entity] of objectMap.entries()) {
                    if (entity.type !== 'ferry' && entity.type !== 'subway' && entity.type !== 'bus' && !currentFlightIds.has(id)) entity.isStale = true;
                }
                flightStatus.style.background = '#00ff00';
            }

            fetchFlights();
            setInterval(fetchFlights, CONFIG.API_INTERVAL);

            scene.onBeforeRenderObservable.add(() => {
                const now = Date.now();
                const renderTime = now - CONFIG.DELAY_MS;
                let counts = { plane: 0, heli: 0, ferry: 0, transit: 0 };

                SIM_ROUTES.forEach(route => {
                    for (let j = 0; j < route.fleetSize; j++) {
                        const entity = objectMap.get(`${route.id}_v${j}`);
                        if (!entity) continue;
                        if (route.type === 'ferry') counts.ferry++; else counts.transit++;
                        const cycleTime = (now + (route.totalLoopDurationMs / route.fleetSize) * j) % route.totalLoopDurationMs;
                        for (const event of route.schedule) {
                            if (cycleTime >= event.startTime && cycleTime < event.endTime) {
                                if (event.type === 'move') {
                                    let progress = easeInOutQuad((cycleTime - event.startTime) / (event.endTime - event.startTime));
                                    BABYLON.Vector3.LerpToRef(event.p1, event.p2, progress, entity.currentPos);
                                } else { entity.currentPos.copyFrom(event.pos); }
                                entity.targetHeading = event.heading; break;
                            }
                        }
                        entity.currentHeading = lerpAngle(entity.currentHeading, entity.targetHeading, 0.05);
                    }
                });

                objectMap.forEach((entity, id) => {
                    if (entity.type === 'ferry' || entity.type === 'subway' || entity.type === 'bus') return;
                    if (entity.type === 'heli') counts.heli++; else counts.plane++;
                    if (entity.history.length === 0) return;
                    if (entity.isStale && renderTime > entity.history[entity.history.length - 1].time) {
                        removePresentationAssets(id); objectMap.delete(id); return;
                    }
                    const hist = entity.history;
                    if (renderTime >= hist[hist.length - 1].time) {
                        const last = hist[hist.length - 1];
                        const distLocal = ((last.gs * 1.852) / 3600000) * (renderTime - last.time) * (1000 / CONFIG.METERS_PER_THREE_UNIT);
                        const rad = last.heading * Math.PI / 180;
                        entity.currentPos.copyFrom(last.pos).addInPlace(new BABYLON.Vector3(Math.sin(rad) * distLocal, 0, Math.cos(rad) * distLocal));
                        entity.targetHeading = last.heading;
                    } else {
                        for (let i = 0; i < hist.length - 1; i++) {
                            if (hist[i].time <= renderTime && hist[i+1].time > renderTime) {
                                const t = (renderTime - hist[i].time) / (hist[i+1].time - hist[i].time);
                                BABYLON.Vector3.LerpToRef(hist[i].pos, hist[i+1].pos, t, entity.currentPos);
                                let hdgDiff = hist[i+1].heading - hist[i].heading;
                                if (hdgDiff > 180) hdgDiff -= 360; if (hdgDiff < -180) hdgDiff += 360;
                                entity.targetHeading = hist[i].heading + hdgDiff * t; break;
                            }
                        }
                    }
                    entity.currentHeading = lerpAngle(entity.currentHeading, entity.targetHeading, 0.1);
                });

                document.getElementById('count-plane').innerText = counts.plane;
                document.getElementById('count-heli').innerText = counts.heli;
                document.getElementById('count-ferry').innerText = counts.ferry;
                document.getElementById('count-transit').innerText = counts.transit;

                objectMap.forEach((entity, id) => {
                    if (!entity.mesh) return;
                    
                    const isInitialPositioning = entity.mesh.position.x === 0 && entity.mesh.position.y === 0 && entity.mesh.position.z === 0;
                    entity.mesh.position.copyFrom(entity.currentPos);
                    // Babylon mesh Y rotation: + rotation is clockwise when looking down, 
                    // Heading is clockwise from North (+Z).
                    entity.mesh.rotation.y = entity.currentHeading * (Math.PI / 180);

                    // Initialize the trail after the first position is set to avoid jumping from origin
                    if (!entity.trail && !isInitialPositioning) {
                        entity.trail = new BABYLON.TrailMesh(id + "_trail", entity.mesh, scene, 0.5, 60, true);
                        const trailMat = new BABYLON.StandardMaterial(id + "_trailMat", scene);
                        if (entity.type === 'plane') trailMat.emissiveColor = new BABYLON.Color3(0, 1, 1);
                        else if (entity.type === 'heli') trailMat.emissiveColor = new BABYLON.Color3(1, 0.6, 0);
                        else if (entity.type === 'ferry') trailMat.emissiveColor = new BABYLON.Color3(1, 0, 1);
                        else if (entity.type === 'subway') trailMat.emissiveColor = new BABYLON.Color3(0.6, 0.2, 1);
                        else if (entity.type === 'bus') trailMat.emissiveColor = new BABYLON.Color3(0.2, 1, 0.2);
                        trailMat.alpha = 0.5;
                        trailMat.disableLighting = true;
                        entity.trail.material = trailMat;
                    }
                });
            });

            const files = [
                "cold_storage.glb", "dsr.glb", "highline.glb", "hy_new_dev.glb", 
                "railroads.glb", "site_building.glb", "street.glb", 
                "street_props.glb", "subway_system.glb", "terrain.glb", "mn04_building.glb"
            ];

            const geoListEl = document.getElementById('geo-list');

            files.forEach(file => {
                const btn = document.createElement('button');
                btn.className = 'geo-btn';
                btn.innerText = file.replace('.glb', '');
                geoListEl.appendChild(btn);

                // Load from parent directory path
                BABYLON.SceneLoader.ImportMesh("", PARAMS.assetPath, file, scene, (meshes) => {
                    meshes.forEach(mesh => {
                        if (mesh.getTotalVertices() > 0) {
                            mesh.material = whiteMat;
                            mesh.receiveShadows = true;
                            // Check filename for shadow exclusion
                            if (file !== "mn04_building.glb") shadowGen.addShadowCaster(mesh);

                            mesh.enableEdgesRendering(0.98);
                            mesh.edgesWidth = 1.0;
                            mesh.edgesColor = new BABYLON.Color4(1, 1, 1, PARAMS.edgeOpacity);

                            const wireClone = mesh.clone(mesh.name + "_wire");
                            wireClone.material = wireMat;
                            wireClone.isPickable = false;
                        }
                    });

                    btn.onclick = () => {
                        const isCurrentlyActive = btn.classList.contains('active');
                        document.querySelectorAll('.geo-btn').forEach(b => b.classList.remove('active'));
                        scene.meshes.forEach(m => {
                            if (m.material && m.material.name === "activeMat") {
                                m.material = whiteMat;
                            }
                        });

                        if (!isCurrentlyActive) {
                            btn.classList.add('active');
                            meshes.forEach(m => {
                                if (m.getTotalVertices() > 0 && m.name.indexOf("_wire") === -1) {
                                    m.material = activeMat;
                                }
                            });
                        }
                    };
                });
            });

            function updateSun() {
                const hour = parseFloat(document.getElementById('sun-hour').value);
                const month = parseInt(document.getElementById('sun-month').value);
                document.getElementById('hour-val').innerText = hour.toFixed(1);

                const lat = 40.75 * (Math.PI / 180);
                const declination = 23.45 * Math.sin((360 / 365) * (month * 30 - 81) * (Math.PI / 180)) * (Math.PI / 180);
                const hourAngle = (hour - 12) * 15 * (Math.PI / 180);
                
                const alt = Math.asin(Math.sin(lat) * Math.sin(declination) + Math.cos(lat) * Math.cos(declination) * Math.cos(hourAngle));
                const az = Math.atan2(Math.sin(hourAngle), Math.cos(hourAngle) * Math.sin(lat) - Math.tan(declination) * Math.cos(lat));

                sunLight.direction = new BABYLON.Vector3(Math.sin(az) * Math.cos(alt), -Math.sin(alt), Math.cos(az) * Math.cos(alt));
            }

            document.getElementById('sun-hour').oninput = updateSun;
            document.getElementById('sun-month').oninput = updateSun;
            updateSun();

            const pipeline = new BABYLON.DefaultRenderingPipeline("fui", true, scene, [camera]);
            pipeline.imageProcessingEnabled = true;
            pipeline.imageProcessing.vignetteEnabled = true;
            pipeline.imageProcessing.vignetteWeight = PARAMS.vignetteWeight;
            pipeline.imageProcessing.contrast = PARAMS.contrast;
            pipeline.samples = 4;

            return scene;
        };

        const scene = createScene();
        engine.runRenderLoop(() => { 
            scene.render(); 
            const n = new Date();
            document.getElementById('clock').innerText = n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0')+':'+n.getSeconds().toString().padStart(2,'0');
        });
        window.addEventListener("resize", () => { engine.resize(); });
    </script>
</body>
</html>
