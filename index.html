<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>3D NYC - Secure Architectural View</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body { margin: 0; padding: 0; background-color: #000; overflow: hidden; font-family: sans-serif; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        #loader-container { position: fixed; top: 0; left: 0; width: 100%; height: 4px; background: #222; z-index: 9999; }
        #loader-bar { width: 0%; height: 100%; background: #ffffff; transition: width 0.3s ease; }
    </style>
</head>
<body>

<div id="loader-container"><div id="loader-bar"></div></div>
<div id="map"></div>

<script>
    /**
     * PARAMETER BLOCK: Adjust visual style here
     */
    const PARAMS = {
        buildingColor: '#fdfdfd', 
        buildingOpacity: 0.9,
        camera: {
            center: [-74.006, 40.7128],
            zoom: 16,
            pitch: 60,
            bearing: -15
        }
    };

    const map = new maplibregl.Map({
        container: 'map',
        // IMPORTANT: We point to our Vercel API function, not MapTiler
        style: '/api/get-style', 
        center: PARAMS.camera.center,
        zoom: PARAMS.camera.zoom,
        pitch: PARAMS.camera.pitch,
        bearing: PARAMS.camera.bearing,
        antialias: true
    });

    map.on('load', () => {
        document.getElementById('loader-bar').style.width = '100%';
        setTimeout(() => document.getElementById('loader-container').style.display = 'none', 500);

        // Add 3D Building Layer
        map.addLayer({
            'id': '3d-buildings',
            'source': 'openmaptiles',
            'source-layer': 'building',
            'type': 'fill-extrusion',
            'minzoom': 13,
            'paint': {
                'fill-extrusion-color': PARAMS.buildingColor,
                'fill-extrusion-height': ['get', 'render_height'],
                'fill-extrusion-base': ['get', 'render_min_height'],
                'fill-extrusion-opacity': PARAMS.buildingOpacity
            }
        });
    });
</script>
</body>
</html>
